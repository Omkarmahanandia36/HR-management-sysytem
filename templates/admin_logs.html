{% extends "admin_base.html" %}
{% block content %}
<div class="panel">
    <h2>Activity Timeline</h2>
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Actor</th>
                    <th>Action</th>
                    <th>Timestamp</th>
                    <th>IP Address</th>
                </tr>
            </thead>
            <tbody>
                {% for row in logs %}
                <tr>
                    <td>{{ row["actor_name"] }}</td>
                    <td>{{ row["action"] }}</td>
                    <td>{{ row["timestamp"] }}</td>
                    <td>{{ row["ip_address"] or "N/A" }}</td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="4">No activity logs found.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
